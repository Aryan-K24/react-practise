<!DOCTYPE html>
<html>
<head>
<title>Chatbot React</title>

<style>

body{
  font-family: Arial;
  background-color:#f5f5f5;
}

.app-container{
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
  margin-top:40px;
}

/* INPUT AREA */

.textbox-container{
  display:flex;
  margin-bottom:20px;
}

.textbox{
  flex-grow:1;
  padding:12px 15px;
  border-radius:10px;
  border:1px solid #ccc;
}

.send-button{
  background-color:rgb(25,135,84);
  color:white;
  border:none;
  padding:12px 20px;
  margin-left:10px;
  border-radius:10px;
  cursor:pointer;
}

/* CHAT AREA */

.messages-container{
  height:400px;
  overflow-y:auto;
}

/* MESSAGE ROWS */

.msg-user{
  display:flex;
  justify-content:end;
  align-items:flex-start;
}

.msg-chatbot{
  display:flex;
  align-items:flex-start;
}

/* MESSAGE BUBBLES */

.chat-message{
  background-color:rgb(220,248,198);
  padding:15px 20px;
  border-radius:10px;
  margin:10px;
  max-width:300px;
}

/* PROFILE IMAGE */

.profile-pic{
  width:40px;
  height:40px;
  object-fit:cover;
  border-radius:50%;
}

</style>
</head>


<body>

<div class="js-container"></div>

<script src="https://unpkg.com/supersimpledev/react.js"></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
<script src="https://unpkg.com/supersimpledev/babel.js"></script>


<script type="text/babel">


/* INPUT COMPONENT */

function ChatbotInput({chatMessages,setChatMessages}){

  const [inputText,setInputText] = React.useState('');

  function handleInput(event){
    setInputText(event.target.value);
  }

  function sendMessage(){

    if(inputText.trim() === '') return;

    const response = Chatbot.getResponse(inputText);

    setChatMessages([
      ...chatMessages,
      {
        message:inputText,
        sender:"user",
        id:crypto.randomUUID()
      },
      {
        message:response,
        sender:"chatbot",
        id:crypto.randomUUID()
      }
    ]);

    setInputText('');
  }

  return(
    <div className="textbox-container">

      <input
        className="textbox"
        placeholder="Send a msg to the chatbot"
        value={inputText}
        onChange={handleInput}
      />

      <button
        className="send-button"
        onClick={sendMessage}
      >
      Send
      </button>

    </div>
  );
}



/* SINGLE MESSAGE */

function ChatMessage({message,sender}){

  return(

    <div className={
      sender === "user"
      ? "msg-user"
      : "msg-chatbot"
    }>

      {sender === "chatbot" &&
        <img src="IMG_3016.jpg" className="profile-pic"/>
      }

      <div className="chat-message">
        {message}
      </div>

      {sender === "user" &&
        <img src="BLUE WHALE.jpg" className="profile-pic"/>
      }

    </div>

  );
}



/* MESSAGE LIST */

function ChatMessages({chatMessages}){

  const messagesRef = React.useRef(null);

  React.useEffect(()=>{
    const container = messagesRef.current;
    if(container){
      container.scrollTop = container.scrollHeight;
    }
  },[chatMessages]);

  return(

    <div className="messages-container" ref={messagesRef}>

      {chatMessages.map((chatMessage)=>(
        <ChatMessage
          key={chatMessage.id}
          message={chatMessage.message}
          sender={chatMessage.sender}
        />
      ))}

    </div>

  );
}



/* MAIN APP */

function App(){

  const [chatMessages,setChatMessages] = React.useState([
    {message:"hello chatbot",sender:"user",id:"1"},
    {message:"hello! How are you doing?",sender:"chatbot",id:"2"},
    {message:"Can you get me today's date?",sender:"user",id:"3"},
    {message:"Today is February 19th",sender:"chatbot",id:"4"}
  ]);


  return(

    <div className="app-container">

      <ChatbotInput
        chatMessages={chatMessages}
        setChatMessages={setChatMessages}
      />

      <ChatMessages
        chatMessages={chatMessages}
      />

    </div>

  );
}



/* RENDER */

const container = document.querySelector('.js-container');

ReactDOM.createRoot(container).render(<App/>);

</script>

</body>
</html>
